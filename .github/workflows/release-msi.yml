name: MSI Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag name'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release title'
        required: true
        default: 'PortalServices MSI Release'
      release_body:
        description: 'Release notes or description'
        required: false
        default: 'Installer for PortalServices built from GitHub Actions.'
      prerelease:
        description: 'Mark the release as prerelease'
        required: false
        default: 'false'
      use_build_artifact:
        description: 'If true, download MSI from a previous build workflow run'
        required: false
        default: 'true'
      build_workflow_file:
        description: 'The workflow filename that created the build artifact (relative to .github/workflows)'
        required: false
        default: 'dotnet-ci.yml'
      build_run_id:
        description: 'Optional: specific workflow run id to take artifacts from'
        required: false
        default: ''
      artifact_name:
        description: 'Artifact name created by build workflow'
        required: false
        default: 'PortalServicesInstaller'
      msi_source_path:
        description: 'Relative path to the MSI file to publish (used when use_build_artifact is false)'
        required: true
        default: 'PortalServicesInstaller.msi'
      target_asset_name:
        description: 'Asset name in the release'
        required: true
        default: 'PortalServicesInstaller.msi'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Retrieve MSI from build workflow (optional)
        if: ${{ inputs.use_build_artifact == 'true' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = $Env:GITHUB_REPOSITORY
          $workflowFile = '${{ inputs.build_workflow_file }}'
          $artifactName = '${{ inputs.artifact_name }}'
          $specifiedRun = '${{ inputs.build_run_id }}'

          Write-Host "Repository: $repo"
          Write-Host "Looking for latest successful run of workflow: $workflowFile"

          if ([string]::IsNullOrEmpty($specifiedRun)) {
            $runsUrl = "https://api.github.com/repos/$repo/actions/workflows/$workflowFile/runs?status=success&per_page=1"
            $runs = Invoke-RestMethod -Headers @{ Authorization = "Bearer $Env:GITHUB_TOKEN" } -Uri $runsUrl -UseBasicParsing
            if ($runs.total_count -eq 0) { throw "No successful runs found for workflow $workflowFile" }
            $runId = $runs.workflow_runs[0].id
            Write-Host "Selected run id: $runId"
          } else {
            $runId = $specifiedRun
            Write-Host "Using specified run id: $runId"
          }

          $artifactsUrl = "https://api.github.com/repos/$repo/actions/runs/$runId/artifacts"
          $artifacts = Invoke-RestMethod -Headers @{ Authorization = "Bearer $Env:GITHUB_TOKEN" } -Uri $artifactsUrl -UseBasicParsing
          if ($artifacts.total_count -eq 0) { throw "No artifacts found for run $runId" }

          $artifact = $artifacts.artifacts | Where-Object { $_.name -eq $artifactName } | Select-Object -First 1
          if (-not $artifact) { throw "Artifact named '$artifactName' not found in run $runId" }

          Write-Host "Found artifact: $($artifact.name) (id=$($artifact.id))"

          $zipUrl = "https://api.github.com/repos/$repo/actions/artifacts/$($artifact.id)/zip"
          $zipPath = Join-Path $PWD "artifact.zip"
          Write-Host "Downloading artifact to $zipPath"
          Invoke-WebRequest -Headers @{ Authorization = "Bearer $Env:GITHUB_TOKEN" } -Uri $zipUrl -OutFile $zipPath -UseBasicParsing

          $extractDir = Join-Path $PWD "artifact"
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          New-Item -ItemType Directory -Path $extractDir | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $extractDir

          $msi = Get-ChildItem -Path $extractDir -Filter *.msi -Recurse | Select-Object -First 1
          if (-not $msi) { throw "No MSI file found inside artifact" }

          $msiPath = $msi.FullName
          Write-Host "MSI extracted to: $msiPath"
          Add-Content -Path $Env:GITHUB_ENV -Value "MSI_PATH=$msiPath"

      - name: Validate MSI source file (fallback)
        if: ${{ inputs.use_build_artifact != 'true' }}
        shell: pwsh
        run: |
          $path = "${{ inputs.msi_source_path }}"
          if (-not (Test-Path -Path $path)) {
            throw "MSI file not found at path: $path"
          }
          Write-Host "Found MSI file at: $path"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          release_name: ${{ inputs.release_name }}
          body: ${{ inputs.release_body }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSI to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.MSI_PATH || inputs.msi_source_path }}
          asset_name: ${{ inputs.target_asset_name }}
          asset_content_type: application/x-msi
