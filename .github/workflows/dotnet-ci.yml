name: .NET CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout external library repository
        uses: actions/checkout@v4
        with:
          repository: suman-chatterjee/course-gh-actions-extlibrary
          path: course-gh-actions-extlibrary
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore course-gh-actions.sln

      - name: Build solution
        run: dotnet build course-gh-actions.sln --configuration Release --no-restore

      - name: Start PortalServices in background
        run: |
          dotnet run --project PortalServices --configuration Release --no-build --urls http://0.0.0.0:5000 &
          # Wait for the service to be ready
          for i in {1..15}; do
            if curl -sSf http://localhost:5000/api/portal/health >/dev/null; then
              echo "PortalServices is up"; break
            fi
            echo "Waiting for PortalServices... ($i)"; sleep 1
          done

      - name: Run PortalClient tests
        env:
          PORTAL_BASE_URL: http://localhost:5000
        run: dotnet run --project PortalClient --configuration Release --no-build
