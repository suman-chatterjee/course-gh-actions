name: .NET CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout external library repository
        uses: actions/checkout@v4
        with:
          repository: suman-chatterjee/course-gh-actions-extlibrary
          path: course-gh-actions-extlibrary
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore course-gh-actions.sln

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Build solution
        run: dotnet build course-gh-actions.sln --configuration Release --no-restore

      - name: Publish PortalServices
        run: dotnet publish PortalServices --configuration Release --output publish\PortalServices

      - name: Create MSI package (PortalServices only)
        shell: pwsh
        run: |
          $repoRoot = "$PWD"
          $publishDir = "$repoRoot\publish\PortalServices"
          $installerDir = "$repoRoot\Installer"
          $msiOutputPath = "$repoRoot\PortalServicesInstaller.msi"
          
          Write-Host "Repo root: $repoRoot"
          Write-Host "Publish directory: $publishDir"
          Write-Host "Installer directory: $installerDir"
          Write-Host "MSI output path: $msiOutputPath"

          if (-not (Test-Path -Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }
          Write-Host "Contents of publish directory:"
          Get-ChildItem -Path $publishDir | Write-Host

          Push-Location $installerDir
          Write-Host "Changed to directory: $(Get-Location)"

          $heatPath = (Get-Command heat.exe -ErrorAction Stop).Source
          $candlePath = (Get-Command candle.exe -ErrorAction Stop).Source
          $lightPath = (Get-Command light.exe -ErrorAction Stop).Source
          $wixBinPath = Split-Path $heatPath
          $wixUtilExtensionPath = Join-Path $wixBinPath "WixUtilExtension.dll"

          Write-Host "heat.exe path: $heatPath"
          Write-Host "candle.exe path: $candlePath"
          Write-Host "light.exe path: $lightPath"
          Write-Host "WixUtilExtension.dll path: $wixUtilExtensionPath"

          if (-not (Test-Path -Path $wixUtilExtensionPath)) {
            throw "WixUtilExtension.dll not found at $wixUtilExtensionPath"
          }

          # Add WiX bin directory to PATH so extensions can be located by name
          $env:Path = "$wixBinPath;$env:Path"
          Write-Host "Updated PATH to include WiX bin: $wixBinPath"

          Write-Host "Running heat.exe..."
          & $heatPath dir $publishDir -ag -srd -dr INSTALLFOLDER -cg PortalServicesComponents -var var.PublishDir -o PortalServices.harvest.wxs -sw1076
          if ($LASTEXITCODE -ne 0) { throw "heat.exe failed with code $LASTEXITCODE" }

          if (-not (Test-Path -Path "PortalServices.harvest.wxs")) {
            throw "Harvest file not created"
          }
          Write-Host "Harvest file created successfully"
          Get-ChildItem -Path "PortalServices.harvest.wxs" | Write-Host

          # Patch the harvested .wxs to add ServiceInstall/ServiceControl for PortalServices.exe
          Write-Host "Patching PortalServices.harvest.wxs to register the Windows Service..."
          try {
            [xml]$xml = Get-Content -Path "PortalServices.harvest.wxs"
            $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
            $ns.AddNamespace("w", "http://schemas.microsoft.com/wix/2006/wi")

            $componentNode = $xml.SelectSingleNode("//w:Component[w:File[contains(@Source,'PortalServices.exe')]]", $ns)
            if (-not $componentNode) {
              Write-Host "Warning: Could not find a component with PortalServices.exe. The harvest may have generated a different filename."
              # Optionally fail here if you want to enforce presence:
              # throw "Could not find component containing PortalServices.exe in harvest file."
            } else {
              # Only add ServiceInstall if not already present
              $existingSI = $componentNode.SelectSingleNode("w:ServiceInstall", $ns)
              if (-not $existingSI) {
                $serviceInstall = $xml.CreateElement("ServiceInstall", $xml.DocumentElement.NamespaceURI)
                $serviceInstall.SetAttribute("Id","PortalServiceInstall")
                $serviceInstall.SetAttribute("Type","ownProcess")
                $serviceInstall.SetAttribute("Name","PortalServices")
                $serviceInstall.SetAttribute("DisplayName","Portal Services")
                $serviceInstall.SetAttribute("Description","Portal Services host")
                $serviceInstall.SetAttribute("Start","auto")
                $serviceInstall.SetAttribute("ErrorControl","normal")
                $serviceInstall.SetAttribute("Vital","yes")
                $componentNode.AppendChild($serviceInstall) | Out-Null
                Write-Host "Added ServiceInstall element."
              } else {
                Write-Host "ServiceInstall already present in component."
              }

              $existingSC = $componentNode.SelectSingleNode("w:ServiceControl", $ns)
              if (-not $existingSC) {
                $serviceControl = $xml.CreateElement("ServiceControl", $xml.DocumentElement.NamespaceURI)
                $serviceControl.SetAttribute("Id","PortalServiceControl")
                $serviceControl.SetAttribute("Name","PortalServices")
                $serviceControl.SetAttribute("Start","install")
                $serviceControl.SetAttribute("Stop","both")
                $serviceControl.SetAttribute("Remove","uninstall")
                $serviceControl.SetAttribute("Wait","yes")
                $componentNode.AppendChild($serviceControl) | Out-Null
                Write-Host "Added ServiceControl element."
              } else {
                Write-Host "ServiceControl already present in component."
              }

              $xml.Save("PortalServices.harvest.wxs")
              Write-Host "Harvest file patched successfully."
            }
          } catch {
            Write-Host "Error patching harvest file: $($_.Exception.Message)"
            throw
          }

          Write-Host "Compiling PortalServices.wxs..."
          & $candlePath -ext WixUtilExtension -dPublishDir="$publishDir" PortalServices.wxs -o PortalServices.wixobj
          if ($LASTEXITCODE -ne 0) { throw "candle.exe failed on PortalServices.wxs with code $LASTEXITCODE" }
  
          Write-Host "Compiling PortalServices.harvest.wxs..."
          & $candlePath -ext WixUtilExtension -dPublishDir="$publishDir" PortalServices.harvest.wxs -o PortalServices.harvest.wixobj

          if (-not (Test-Path -Path "PortalServices.wixobj")) {
            throw "PortalServices.wixobj not created"
          }
          if (-not (Test-Path -Path "PortalServices.harvest.wixobj")) {
            throw "PortalServices.harvest.wixobj not created"
          }
          Write-Host "Object files created successfully"

          Write-Host "Linking MSI to: $msiOutputPath"
          & $lightPath -ext WixUtilExtension PortalServices.wixobj PortalServices.harvest.wixobj -o "$msiOutputPath" -sw1076
          if ($LASTEXITCODE -ne 0) { 
            Write-Host "light.exe exit code: $LASTEXITCODE"
            Get-ChildItem -Path "." | Write-Host
            throw "light.exe failed with code $LASTEXITCODE" 
          }

          Pop-Location
          Write-Host "Returned to directory: $(Get-Location)"

          Write-Host "Checking for MSI at: $msiOutputPath"
          if (-not (Test-Path -Path $msiOutputPath)) {
            Write-Host "MSI not found. Contents of repo root:"
            Get-ChildItem -Path $repoRoot | Write-Host
            Write-Host "Contents of Installer directory:"
            Get-ChildItem -Path $installerDir | Write-Host
            throw "MSI file not created at $msiOutputPath"
          }
          Write-Host "MSI created successfully at: $msiOutputPath"
          Get-ChildItem -Path $msiOutputPath | Write-Host

      - name: Collect installer outputs (MSI + any CABs)
        shell: pwsh
        run: |
          $artifactDir = Join-Path $PWD "installer-artifacts"
          if (Test-Path $artifactDir) { Remove-Item -Recurse -Force $artifactDir }
          New-Item -ItemType Directory -Path $artifactDir | Out-Null

          $msiPath = Join-Path $PWD "PortalServicesInstaller.msi"
          if (Test-Path $msiPath) {
            Copy-Item -Path $msiPath -Destination $artifactDir
          } else {
            throw "Expected MSI not found at $msiPath"
          }

          $cabFiles = Get-ChildItem -Path $PWD -Filter *.cab -Recurse -ErrorAction SilentlyContinue
          if ($cabFiles) {
            foreach ($c in $cabFiles) {
              Copy-Item -Path $c.FullName -Destination $artifactDir
            }
          }

          Write-Host "Collected artifacts:"
          Get-ChildItem -Path $artifactDir | Write-Host

          Add-Content -Path $Env:GITHUB_ENV -Value "INSTALLER_ARTIFACTS_DIR=$artifactDir"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PortalServicesInstaller
          path: ${{ env.INSTALLER_ARTIFACTS_DIR }}

      - name: Start PortalServices for client tests
        shell: pwsh
        run: |
          Start-Process -FilePath dotnet -ArgumentList 'run','--project','PortalServices','--configuration','Release','--no-build','--urls','http://localhost:5000' -NoNewWindow
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $response = Invoke-WebRequest -UseBasicParsing -Uri 'http://localhost:5000/api/portal/health' -TimeoutSec 5 -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                Write-Host 'PortalServices is up'; break
              }
            } catch {
              Write-Host "Waiting for PortalServices... ($($i + 1))"
            }
            Start-Sleep -Seconds 1
          }

      - name: Run PortalClient tests
        env:
          PORTAL_BASE_URL: http://localhost:5000
        run: dotnet run --project PortalClient --configuration Release --no-build
